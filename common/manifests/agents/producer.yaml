schema_version: "1.0"
kind: agent
id: producer
title: Producer
purpose: Coordinates sprint planning, milestone delivery, and cross-team production risk management.
collaboration_contract_ref: protocols/collaboration
capabilities:
  - production_coordination
  - sprint_planning
  - risk_management
  - structured_choice_capture
model_profile: strategic_high
tool_capability_needs:
  - file_read
  - file_write
  - file_edit
  - pattern_search
  - text_search
  - web_fetch
  - execute_shell
delegation_intent: multi_delegate
source_refs:
  - Claude-Code-Game-Studios/.claude/agents/producer.md
projection_notes:
  - target: codex
    note: Coordinated decision collection may require wrapper prompts for deterministic option capture.
    workaround_class: generated_wrapper
  - target: openclaw
    note: Multi-department option capture may be downgraded to explicit staged prompts in CLI workflows.
    workaround_class: protocol_downgrade
warning_rules:
  - code: W_MODEL_PROFILE_NORMALIZED
    trigger_condition: Source model tier uses provider labels.
    recommended_fallback: Persist canonical model_profile strategic_high.
  - code: W_INTERACTIVE_CAPTURE_WRAPPED
    trigger_condition: Structured choice capture is requested but target lacks native capture.
    recommended_fallback: Use generated wrapper prompts with deterministic option labels.
