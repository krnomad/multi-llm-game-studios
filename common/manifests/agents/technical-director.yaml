schema_version: "1.0"
kind: agent
id: technical-director
title: Technical Director
purpose: Owns architecture, technology decisions, and performance-risk strategy across systems.
collaboration_contract_ref: protocols/collaboration
capabilities:
  - architecture_governance
  - strategic_decision_framing
  - technical_risk_management
  - structured_choice_capture
model_profile: strategic_high
tool_capability_needs:
  - file_read
  - file_write
  - file_edit
  - pattern_search
  - text_search
  - web_fetch
  - execute_shell
delegation_intent: single_delegate
source_refs:
  - Claude-Code-Game-Studios/.claude/agents/technical-director.md
projection_notes:
  - target: codex
    note: Interactive strategic decision capture may need wrapper prompts when no native selectable UI exists.
    workaround_class: generated_wrapper
  - target: openclaw
    note: Preserve strategic options through protocol-level text capture in repo and CLI flows.
    workaround_class: protocol_downgrade
warning_rules:
  - code: W_MODEL_PROFILE_NORMALIZED
    trigger_condition: Source model tier uses provider labels.
    recommended_fallback: Persist canonical model_profile strategic_high.
  - code: W_INTERACTIVE_CAPTURE_WRAPPED
    trigger_condition: Structured choice capture is requested but target lacks native capture.
    recommended_fallback: Use generated wrapper prompts with deterministic option labels.
