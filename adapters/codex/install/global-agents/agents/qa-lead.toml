name = "QA Lead"
id = "qa-lead"
description = "Owns test strategy, bug triage, regression planning, and release quality gates."
model_profile = "quality_mid"
support_posture = "supported_with_workarounds"
runtime_loading = "project_local_with_global_fallback"
workaround_class = "protocol_downgrade"
project_local_custom_agents_reliable = false
source_refs = ["Claude-Code-Game-Studios/.claude/agents/qa-lead.md"]
capabilities = ["quality_gate_enforcement", "test_strategy_planning", "bug_triage_governance"]
tool_capability_needs = ["file_read", "file_write", "file_edit", "pattern_search", "text_search", "execute_shell"]
delegation_intent = "single_delegate"
warning_codes = ["W_APPROVAL_PROTOCOL_ENFORCED", "W_CODEX_PROJECT_LOCAL_AGENT_LIMITATION", "W_MODEL_PROFILE_NORMALIZED"]

[projection]
note = "Approval-before-write collaboration gates should be surfaced through explicit prompt checkpoints."
install_package = "adapters/codex/install/global-agents"
global_install_target = "~/.codex/agents/"

[structured_choice]
enabled = false
native_parity = false
strategy = "text_first_deterministic_options"
option_label_pattern = "OPTION_[A-Z]"
response_fields = ["CHOSEN_OPTION", "RATIONALE"]

[[warnings]]
code = "W_APPROVAL_PROTOCOL_ENFORCED"
severity = "info"
recommended_fallback = "Set workflow approval gate to before_write and block violations."

[[warnings]]
code = "W_CODEX_PROJECT_LOCAL_AGENT_LIMITATION"
severity = "warning"
recommended_fallback = "Generate and document global-agent install wrapper for deterministic behavior."

[[warnings]]
code = "W_MODEL_PROFILE_NORMALIZED"
severity = "info"
recommended_fallback = "Persist canonical model_profile values in manifests and projected outputs."
