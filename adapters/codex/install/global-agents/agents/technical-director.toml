name = "Technical Director"
id = "technical-director"
description = "Owns architecture, technology decisions, and performance-risk strategy across systems."
model_profile = "strategic_high"
support_posture = "supported_with_workarounds"
runtime_loading = "project_local_with_global_fallback"
workaround_class = "generated_wrapper"
project_local_custom_agents_reliable = false
source_refs = ["Claude-Code-Game-Studios/.claude/agents/technical-director.md"]
capabilities = ["architecture_governance", "strategic_decision_framing", "technical_risk_management", "structured_choice_capture"]
tool_capability_needs = ["file_read", "file_write", "file_edit", "pattern_search", "text_search", "web_fetch", "execute_shell"]
delegation_intent = "single_delegate"
warning_codes = ["W_CODEX_PROJECT_LOCAL_AGENT_LIMITATION", "W_INTERACTIVE_CAPTURE_WRAPPED", "W_MODEL_PROFILE_NORMALIZED"]

[projection]
note = "Interactive strategic decision capture may need wrapper prompts when no native selectable UI exists."
install_package = "adapters/codex/install/global-agents"
global_install_target = "~/.codex/agents/"

[structured_choice]
enabled = true
native_parity = false
strategy = "text_first_deterministic_options"
option_label_pattern = "OPTION_[A-Z]"
response_fields = ["CHOSEN_OPTION", "RATIONALE"]

[[warnings]]
code = "W_CODEX_PROJECT_LOCAL_AGENT_LIMITATION"
severity = "warning"
recommended_fallback = "Generate and document global-agent install wrapper for deterministic behavior."

[[warnings]]
code = "W_INTERACTIVE_CAPTURE_WRAPPED"
severity = "warning"
recommended_fallback = "Use generated wrapper prompts plus deterministic option parsing."

[[warnings]]
code = "W_MODEL_PROFILE_NORMALIZED"
severity = "info"
recommended_fallback = "Persist canonical model_profile values in manifests and projected outputs."
